<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#20d6ee"/>
      <stop offset="100%" stop-color="#0e7fff"/>
    </linearGradient>
  </defs>

  <!-- Outer ghost ring -->
  <circle cx="16" cy="16" r="13" stroke="#20d6ee" stroke-width="0.5" stroke-opacity="0.25" fill="none"/>

  <!-- Arc 1 — top-right, thick, primary -->
  <path d="M16 3 A13 13 0 0 1 29 16" stroke="url(#fg)" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Arc 2 — bottom half -->
  <path d="M29 16 A13 13 0 0 1 3 16" stroke="url(#fg)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Arc 3 — top-left close -->
  <path d="M3 16 A13 13 0 0 1 16 3" stroke="url(#fg)" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- Implied A -->
  <path d="M9 21 L16 6 L23 21" stroke="url(#fg)" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
  <line x1="12" y1="16" x2="20" y2="16" stroke="#20d6ee" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Apex dot -->
  <circle cx="16" cy="3" r="1.8" fill="#20d6ee"/>
</svg>
