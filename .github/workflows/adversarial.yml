name: Weekly Adversarial Testing
on:
  # DISABLED: re-enable when ready to consume API credits weekly
  # schedule:
  #   - cron: '0 6 * * 1'  # Every Monday at 6:00 AM UTC
  workflow_dispatch:

jobs:
  adversarial:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run adversarial tests
        env:
          CHAT_API_URL: https://santifer.io/api/chat
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run adversarial -- --attacks=20
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adversarial-report-${{ github.run_id }}
          path: test-results/
