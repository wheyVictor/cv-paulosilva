name: Chatbot Evals
on:
  # DISABLED: re-enable when ready to consume API credits on every push
  # push:
  #   branches: [main]
  workflow_dispatch:

jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Wait for Vercel deploy
        run: sleep 90
      - name: Run evals
        env:
          CHAT_API_URL: https://santifer.io/api/chat
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run evals
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.sha }}
          path: evals/results/
